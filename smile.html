<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SMILE</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: monospace;

      /* +10% brightness */
      filter: brightness(1.1);
    }

    canvas#bg {
      position: fixed;
      top: 0;
      left: 0;
    }

    .video-wrap {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;

      display: flex;
      align-items: center;
      justify-content: center;

      z-index: 2;
      pointer-events: none;
    }

    /* SMALLER WEBCAM */
    video,
    canvas#slowCam {
      position: absolute;

      width: 43.75vw;
      max-width: 563px;
      height: auto;

      border: 2px solid #FF0000;
      box-shadow: none;
      background: black;
    }
  </style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="video-wrap">
  <video id="video" autoplay playsinline></video>
</div>

<script>

/* ---------------- WEBCAM (SLOW CCTV MODE) ---------------- */
const video = document.getElementById("video");

async function startWebcam() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: "user",
        frameRate: { ideal: 10, max: 15 },
        width: { ideal: 640 },
        height: { ideal: 480 }
      },
      audio: false
    });

    video.srcObject = stream;
    slowVideoPlayback(video);

  } catch (err) {
    console.error(err);
  }
}

/* ---------------- SLOW FRAME RENDER ---------------- */
function slowVideoPlayback(videoEl) {
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.id = "slowCam";
  canvas.width = 640;
  canvas.height = 480;

  let last = 0;
  const FPS_LIMIT = 8;

  function render(t) {
    requestAnimationFrame(render);

    if (t - last < 1000 / FPS_LIMIT) return;
    last = t;

    if (videoEl.readyState >= 2) {
      ctx.drawImage(videoEl, 0, 0, canvas.width, canvas.height);
    }
  }

  requestAnimationFrame(render);

  videoEl.style.display = "none";

  const wrap = document.querySelector(".video-wrap");
  wrap.appendChild(canvas);
}

window.addEventListener("load", startWebcam);


/* ---------------- EXIT FIELD ---------------- */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const fontSize = 18;
const letters = ["E", "X", "1", "T"];

let cols, rows;
let grid = [];

function randChar() {
  return letters[Math.floor(Math.random() * letters.length)];
}

function initGrid() {

  /* Fill all screen edges */
  cols = Math.ceil(canvas.width / fontSize) + 1;
  rows = Math.ceil(canvas.height / fontSize) + 1;

  grid = [];

  for (let x = 0; x < cols; x++) {
    grid[x] = [];
    for (let y = 0; y < rows; y++) {
      grid[x][y] = randChar();
    }
  }
}

initGrid();
window.addEventListener("resize", initGrid);


/* ---------------- MODE ---------------- */
let mode = "chaos";
let timer = 0;

function triggerMode() {
  mode = Math.random() > 0.5 ? "LOCK" : "chaos";
  timer = 120 + Math.random() * 180;
}

triggerMode();


/* ---------------- GLITCH HELPERS ---------------- */
function glitchJitter() {
  return (Math.random() - 0.5) * 2;
}

function drawNoise() {
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imageData.data;

  for (let i = 0; i < data.length; i += 16) {
    const n = (Math.random() - 0.5) * 40;
    data[i] += n;
    data[i + 1] += n;
    data[i + 2] += n;
  }

  ctx.putImageData(imageData, 0, 0);
}


/* ---------------- UPDATE ---------------- */
function update() {
  timer--;

  if (timer <= 0 && Math.random() > 0.97) {
    triggerMode();
  }

  const changes = cols * rows * 0.02;

  for (let i = 0; i < changes; i++) {
    const x = Math.floor(Math.random() * cols);
    const y = Math.floor(Math.random() * rows);

    if (mode === "LOCK") {
      grid[x][y] = ["E", "X", "1", "T"][(x + y) % 4];
    } else {
      grid[x][y] = randChar();
    }
  }
}


/* ---------------- DRAW ---------------- */
function draw() {

  ctx.fillStyle = "rgba(0,0,0,0.35)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.font = fontSize + "px monospace";
  ctx.fillStyle = "#FF0000";

  for (let x = 0; x < cols; x++) {
    for (let y = 0; y < rows; y++) {

      let offsetX = 0;
      let offsetY = 0;

      if (Math.random() < 0.02) offsetX = glitchJitter() * 10;
      if (mode === "LOCK" && Math.random() < 0.01) {
        offsetY = glitchJitter() * 20;
      }

      /* Overdraw edges so there are no gaps */
      ctx.fillText(
        grid[x][y],
        x * fontSize - 4 + offsetX,
        y * fontSize + fontSize - 4 + offsetY
      );
    }
  }

  if (Math.random() < 0.05) {
    ctx.fillStyle = "rgba(0,255,136,0.15)";
    ctx.fillRect(
      0,
      Math.random() * canvas.height,
      canvas.width,
      3
    );
  }

  if (Math.random() < 0.03) {
    drawNoise();
  }

  update();
}

setInterval(draw, 33);

</script>

</body>
</html>
